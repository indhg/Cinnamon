<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>红云irch的肉桂卷</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== 移动端顶栏 ==================== -->
  <div class="topbar">
    <button class="hamburger" id="menuBtn" title="菜单">☰</button>
    <span class="brand-sm">红云irch的肉桂卷</span>
  </div>

  <!-- ==================== 遮罩（移动端） ==================== -->
  <div class="sidebar-overlay" id="overlay"></div>

  <div class="notes-layout">

    <!-- ==================== 侧边栏 ==================== -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand-sm">红云irch的肉桂卷</div>
      </div>

      <!-- 搜索框 -->
      <div class="search-wrap">
        <input
          type="text"
          id="searchInput"
          placeholder="搜索笔记 / 科目…"
          autocomplete="off"
        >
      </div>

      <!-- 树形导航 -->
      <div class="tree" id="tree">
        <div class="tree-empty">加载中…</div>
      </div>
    </nav>

    <!-- ==================== 内容区 ==================== -->
    <main class="content" id="contentArea">

      <!-- 顶栏信息 -->
      <div class="content-topbar" id="contentTopbar">
        <span class="note-title" id="noteTitle">欢迎喵</span>
        <div class="actions">
          <a class="btn btn-download" id="btnDownload" style="display:none"
             href="#" download>下载 .one</a>
        </div>
      </div>

      <!-- 主页 / PDF 预览区 -->
      <div class="pdf-viewer" id="pdfViewer">

        <!-- 默认欢迎区（未选中笔记时显示） -->
        <div class="welcome-placeholder" id="welcomeArea">
          <div class="welcome-inner">
            <div class="welcome-brand">
              红云irch的肉桂卷
            </div>
            <div class="welcome-divider"></div>

            <div class="welcome-preface">
              索琳肉桂卷（Cinnamon Rollyn）是Terraria 众神之怒MOD 中的一种食物，能提供非常强力的buff。
            </div>

            <p class="welcome-hint">
              左侧选择笔记即可预览
            </p>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
