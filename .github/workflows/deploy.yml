# Cinnamon — 每次 push 后自动扫描笔记并更新索引
name: 更新笔记索引

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'notes-index.json'   # 索引文件自身的更新不触发（避免循环）
  workflow_dispatch:          # 允许手动触发

jobs:
  update-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write         # 允许推送提交

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 扫描 notes/ 生成索引
        run: node scripts/build-index.js

      - name: 提交并推送更新后的索引
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes-index.json
          if git diff --cached --quiet; then
            echo "索引无变化，跳过提交"
          else
            git commit -m "📋 自动更新笔记索引"
            git push
          fi
